<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Marine 2 Leveling | XpeedCarry</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<header class="navbar">
  <a href="index.html" class="logo">XpeedCarry</a>
</header>

<section class="service-hero">
  <h1>Warhammer 40K Space Marine 2 Leveling</h1>
</section>

<main class="leveling-page">

<section class="order-section">
<div class="order-card">

<h2>Customize Order</h2>

<!-- LEVEL RANGE -->
<div class="order-group" id="levelRangeGroup">
  <h3>Level Range</h3>

  <div class="level-inputs">
    <div class="input-box">
      <label>Current Level</label>
      <input type="number" id="currentLevel" value="1" min="1" max="25">
    </div>

    <div class="input-box">
      <label>Desired Level</label>
      <input type="number" id="desiredLevel" value="10" min="1" max="25">
    </div>
  </div>

  <div class="dual-range-wrapper">
    <div class="slider-track"></div>
    <div class="slider-progress" id="levelProgress"></div>

    <input type="range" id="rangeMin" min="1" max="25" value="1">
    <input type="range" id="rangeMax" min="1" max="25" value="10">
  </div>

  <div class="range-labels">
    <span>1</span><span>5</span><span>10</span>
    <span>15</span><span>20</span><span>25</span>
  </div>
</div>

<!-- SERVICE TYPE -->
<div class="order-group">
  <h3>Choose the Service Type</h3>

  <label><input type="radio" name="service" value="custom" checked> Custom Leveling</label>
  <label><input type="radio" name="service" value="full"> Full 1-25 Leveling</label>
  <label><input type="radio" name="service" value="prestige"> Prestige Leveling</label>
</div>

<!-- PRESTIGE -->
<div class="order-group hidden" id="prestigeGroup">

  <h3>Prestige Range</h3>

  <div class="level-inputs">
    <div class="input-box">
      <label>Current Prestige</label>
      <input type="number" id="prestigeStart" value="1" min="1" max="4">
    </div>

    <div class="input-box">
      <label>Desired Prestige</label>
      <input type="number" id="prestigeEnd" value="2" min="1" max="4">
    </div>
  </div>

  <div class="dual-range-wrapper">
    <div class="slider-track"></div>
    <div class="slider-progress" id="prestigeProgress"></div>

    <input type="range" id="prestigeMin" min="1" max="4" value="1">
    <input type="range" id="prestigeMax" min="1" max="4" value="2">
  </div>

  <div class="range-labels">
    <span>1</span><span>2</span><span>3</span><span>4</span>
  </div>

</div>

<!-- EXTRA -->
<div class="order-group">
  <h3>Additional Options</h3>

  <label>
    <input type="checkbox" id="trials">
    Add Trials completion (+$4.00)
  </label>
</div>

<!-- TOTAL -->
<div class="total-box">
  <span>Total</span>
  <strong id="total">$0.00</strong>
</div>

<button class="buy-btn">Buy Now</button>

</div>
</section>

</main>

<script>

const LEVEL_PRICE = 1.40;
const FULL_PRICE = 14.95;
const PRESTIGE_PRICE = 14.90;
const TRIALS = 4;

// ELEMENTS
const minRange = document.getElementById("rangeMin");
const maxRange = document.getElementById("rangeMax");
const currentInput = document.getElementById("currentLevel");
const desiredInput = document.getElementById("desiredLevel");
const progress = document.getElementById("levelProgress");

const prestigeGroup = document.getElementById("prestigeGroup");
const pMin = document.getElementById("prestigeMin");
const pMax = document.getElementById("prestigeMax");
const pStart = document.getElementById("prestigeStart");
const pEnd = document.getElementById("prestigeEnd");
const pProgress = document.getElementById("prestigeProgress");

const totalEl = document.getElementById("total");

function updateSlider(minEl, maxEl, progressEl) {

  let min = parseInt(minEl.value);
  let max = parseInt(maxEl.value);

  if (min >= max) {
    min = max - 1;
    minEl.value = min;
  }

  const percentMin = (min - minEl.min) / (minEl.max - minEl.min) * 100;
  const percentMax = (max - maxEl.min) / (maxEl.max - maxEl.min) * 100;

  progressEl.style.left = percentMin + "%";
  progressEl.style.width = (percentMax - percentMin) + "%";
}

function calculate() {

  const service = document.querySelector('input[name="service"]:checked').value;

  let total = 0;

  if (service === "custom") {
    let levels = desiredInput.value - currentInput.value;
    total = levels * LEVEL_PRICE;
  }

  if (service === "full") {
    total = FULL_PRICE;
  }

  if (service === "prestige") {
    let diff = pEnd.value - pStart.value;
    total = diff * PRESTIGE_PRICE;
  }

  if (document.getElementById("trials").checked) {
    total += TRIALS;
  }

  totalEl.textContent = "$" + total.toFixed(2);
}

// EVENTS

[minRange, maxRange].forEach(el => {
  el.addEventListener("input", () => {
    updateSlider(minRange, maxRange, progress);
    currentInput.value = minRange.value;
    desiredInput.value = maxRange.value;
    calculate();
  });
});

[pMin, pMax].forEach(el => {
  el.addEventListener("input", () => {
    updateSlider(pMin, pMax, pProgress);
    pStart.value = pMin.value;
    pEnd.value = pMax.value;
    calculate();
  });
});

document.querySelectorAll('input[name="service"]').forEach(r => {
  r.addEventListener("change", () => {
    const val = r.value;

    if (val === "prestige") {
      prestigeGroup.classList.remove("hidden");
    } else {
      prestigeGroup.classList.add("hidden");
    }

    calculate();
  });
});

document.getElementById("trials").addEventListener("change", calculate);

// INIT
updateSlider(minRange, maxRange, progress);
updateSlider(pMin, pMax, pProgress);
calculate();

</script>

</body>
</html>
